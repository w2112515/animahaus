name: llama-cpp-multi-variant

on:
  workflow_dispatch:
    inputs:
      target_profile:
        description: Build scope for manual publication
        required: true
        type: choice
        default: representative
        options:
          - representative
          - ampere-only
          - full
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            variant: cpu
            asset_variant: cpu
            cuda_arches: ""
            archive_ext: zip
          - os: windows-latest
            platform: win
            variant: turing
            asset_variant: cuda-turing
            cuda_arches: "75"
            archive_ext: zip
          - os: windows-latest
            platform: win
            variant: ampere
            asset_variant: cuda-ampere
            cuda_arches: "86;89"
            archive_ext: zip
          - os: windows-latest
            platform: win
            variant: blackwell
            asset_variant: cuda-blackwell
            cuda_arches: "100;120"
            archive_ext: zip
          - os: ubuntu-22.04
            platform: linux
            variant: cpu
            asset_variant: cpu
            cuda_arches: ""
            archive_ext: tar.gz
          - os: ubuntu-22.04
            platform: linux
            variant: turing
            asset_variant: cuda-turing
            cuda_arches: "75"
            archive_ext: tar.gz
          - os: ubuntu-22.04
            platform: linux
            variant: ampere
            asset_variant: cuda-ampere
            cuda_arches: "86;89"
            archive_ext: tar.gz
          - os: ubuntu-22.04
            platform: linux
            variant: blackwell
            asset_variant: cuda-blackwell
            cuda_arches: "100;120"
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Select build scope
        id: scope
        shell: pwsh
        run: |
          $runEntry = $true
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            switch ("${{ inputs.target_profile }}") {
              "representative" {
                $runEntry = "${{ matrix.platform }}" -eq "win" -and ("${{ matrix.variant }}" -eq "cpu" -or "${{ matrix.variant }}" -eq "ampere")
              }
              "ampere-only" {
                $runEntry = "${{ matrix.platform }}" -eq "win" -and "${{ matrix.variant }}" -eq "ampere"
              }
              default {
                $runEntry = $true
              }
            }
          }
          "run_entry=$($runEntry.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.scope.outputs.run_entry == 'true'
        with:
          repository: ggml-org/llama.cpp
          ref: b8198

      - name: Set up CMake
        if: steps.scope.outputs.run_entry == 'true'
        uses: lukka/get-cmake@latest

      - name: Set up MSVC
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'win'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up CUDA
        if: steps.scope.outputs.run_entry == 'true' && matrix.variant != 'cpu'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.4.1"

      - name: Configure Windows
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'win'
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-DLLAMA_BUILD_SERVER=ON",
            "-DBUILD_SHARED_LIBS=OFF"
          )
          if ("${{ matrix.variant }}" -ne "cpu") {
            $cmakeArgs += @(
              "-DGGML_CUDA=ON",
              "-DCMAKE_CUDA_ARCHITECTURES=${{ matrix.cuda_arches }}"
            )
            if ("${{ matrix.variant }}" -eq "ampere" -or "${{ matrix.variant }}" -eq "blackwell") {
              $cmakeArgs += "-DGGML_CUDA_F16=ON"
            }
          } else {
            $cmakeArgs = @(
              "-DLLAMA_BUILD_SERVER=ON",
              "-DBUILD_SHARED_LIBS=ON",
              "-DGGML_CPU_ALL_VARIANTS=ON",
              "-DGGML_BACKEND_DL=ON"
            )
          }
          cmake -S . -B build @cmakeArgs

      - name: Configure Linux
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'linux'
        shell: bash
        run: |
          base="-DLLAMA_BUILD_SERVER=ON -DBUILD_SHARED_LIBS=OFF"
          extra=""
          if [ "${{ matrix.variant }}" != "cpu" ]; then
            extra="-DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.cuda_arches }}"
            if [ "${{ matrix.variant }}" = "ampere" ] || [ "${{ matrix.variant }}" = "blackwell" ]; then
              extra="$extra -DGGML_CUDA_F16=ON"
            fi
          else
            base="-DLLAMA_BUILD_SERVER=ON -DBUILD_SHARED_LIBS=ON"
            extra="-DGGML_CPU_ALL_VARIANTS=ON -DGGML_BACKEND_DL=ON"
          fi
          cmake -S . -B build $base $extra

      - name: Build Windows
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'win'
        shell: pwsh
        run: |
          $targets = @(
            "llama-server",
            "llama-bench",
            "llama-cli"
          )
          cmake --build build --config Release --target @targets --parallel

      - name: Build Linux
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'linux'
        shell: bash
        run: cmake --build build --config Release --target llama-server --parallel

      - name: Package Windows
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'win'
        shell: pwsh
        run: |
          $asset = "llama-b8198-bin-${{ matrix.platform }}-${{ matrix.asset_variant }}-x64.zip"
          $releaseBin = "build\bin\Release"
          $requiredExecutables = @(
            "llama-server.exe",
            "llama-bench.exe",
            "llama-cli.exe"
          )
          $opensslRuntimeDlls = @(
            "libssl-3-x64.dll",
            "libcrypto-3-x64.dll"
          )
          New-Item -ItemType Directory -Force -Path out | Out-Null

          foreach ($exe in $requiredExecutables) {
            $source = Join-Path $releaseBin $exe
            if (!(Test-Path $source)) {
              throw "Missing expected Windows package executable: $exe"
            }
            Copy-Item $source out\
          }

          if (Test-Path "$releaseBin\*.dll") {
            Copy-Item "$releaseBin\*.dll" out\
          }

          $gitCommand = Get-Command git -ErrorAction Stop
          $gitCmdDir = Split-Path $gitCommand.Source
          $mingwBin = [System.IO.Path]::GetFullPath((Join-Path $gitCmdDir "..\mingw64\bin"))
          foreach ($dll in $opensslRuntimeDlls) {
            $source = Join-Path $mingwBin $dll
            if (!(Test-Path $source)) {
              throw "Missing expected OpenSSL runtime dependency: $dll"
            }
            Copy-Item $source out\
          }
          Compress-Archive -Path out\* -DestinationPath $asset -Force

      - name: Package Linux
        if: steps.scope.outputs.run_entry == 'true' && matrix.platform == 'linux'
        shell: bash
        run: |
          asset="llama-b8198-bin-${{ matrix.platform }}-${{ matrix.asset_variant }}-x64.tar.gz"
          mkdir -p out
          cp build/bin/llama-server out/
          find build -maxdepth 2 -type f \( -name "*.so" -o -name "*.so.*" \) -exec cp {} out/ \;
          tar -czf "$asset" -C out .

      - name: Upload artifact
        if: steps.scope.outputs.run_entry == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: llama-${{ matrix.platform }}-${{ matrix.asset_variant }}
          path: llama-b8198-bin-${{ matrix.platform }}-${{ matrix.asset_variant }}-x64.${{ matrix.archive_ext }}

      - name: Publish release assets
        if: steps.scope.outputs.run_entry == 'true' && (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llama-b8198-ah1
          files: llama-b8198-bin-${{ matrix.platform }}-${{ matrix.asset_variant }}-x64.${{ matrix.archive_ext }}
